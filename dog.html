<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cosmic Dog</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(ellipse at center, #1a0b2e 0%, #060010 70%, #000 100%);
    overflow: hidden;
    font-family: -apple-system, sans-serif;
  }
  .stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  svg { width: min(90vw, 90vh); height: min(90vw, 90vh); }

  /* Twinkling stars */
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.3); }
  }

  .title {
    position: absolute; top: 24px; left: 0; right: 0;
    text-align: center;
    color: #fff;
    letter-spacing: 0.4em;
    font-weight: 200;
    font-size: 14px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* Dog animations */
  .body     { animation: breathe 3s ease-in-out infinite; transform-origin: center; }
  .tail     { animation: wag 0.4s ease-in-out infinite alternate; transform-origin: 290px 215px; }
  .ear-l    { animation: earWiggle 4s ease-in-out infinite; transform-origin: 175px 150px; }
  .ear-r    { animation: earWiggle 4s ease-in-out infinite reverse; transform-origin: 225px 150px; }
  .eye      { animation: blink 4s infinite; transform-origin: center; }
  .tongue   { animation: pant 0.6s ease-in-out infinite alternate; transform-origin: 200px 220px; }
  .aura     { animation: pulse 4s ease-in-out infinite; transform-origin: center; }
  .sparkle  { animation: sparkle 2s ease-in-out infinite; transform-origin: center; }

  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.015)} }
  @keyframes wag     { from{transform:rotate(-25deg)} to{transform:rotate(25deg)} }
  @keyframes earWiggle { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-8deg)} }
  @keyframes blink   { 0%,92%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
  @keyframes pant    { from{transform:scaleY(1) translateY(0)} to{transform:scaleY(1.2) translateY(3px)} }
  @keyframes pulse   { 0%,100%{opacity:0.3; transform:scale(1)} 50%{opacity:0.6; transform:scale(1.1)} }
  @keyframes sparkle { 0%,100%{opacity:0; transform:scale(0.5) rotate(0)} 50%{opacity:1; transform:scale(1.2) rotate(180deg)} }
</style>
</head>
<body>
  <div class="title">&#8226; cosmic good boy &#8226;</div>
  <div class="stage">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="aura" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#ff6ec7" stop-opacity="0.8"/>
          <stop offset="50%" stop-color="#7873f5" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="fur" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffb17a"/>
          <stop offset="60%" stop-color="#e8893b"/>
          <stop offset="100%" stop-color="#a85a1a"/>
        </linearGradient>
        <linearGradient id="furLight" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffd9b3"/>
          <stop offset="100%" stop-color="#f0a867"/>
        </linearGradient>
        <radialGradient id="eye" cx="40%" cy="40%" r="60%">
          <stop offset="0%"  stop-color="#7df9ff"/>
          <stop offset="50%" stop-color="#1e90ff"/>
          <stop offset="100%" stop-color="#0a1466"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Aura -->
      <circle class="aura" cx="200" cy="220" r="170" fill="url(#aura)"/>

      <!-- Tail (behind body) -->
      <g class="tail">
        <path d="M 290 215 Q 330 190 340 150 Q 345 140 335 138 Q 320 160 300 185 Q 285 200 290 215 Z"
              fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <path d="M 325 150 Q 335 145 337 140" stroke="#fff3d9" stroke-width="2" fill="none" opacity="0.6"/>
      </g>

      <g class="body">
        <!-- Back legs -->
        <ellipse cx="255" cy="290" rx="22" ry="30" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <ellipse cx="155" cy="290" rx="22" ry="30" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <ellipse cx="255" cy="315" rx="24" ry="10" fill="#3d1f0a"/>
        <ellipse cx="155" cy="315" rx="24" ry="10" fill="#3d1f0a"/>

        <!-- Body -->
        <ellipse cx="200" cy="250" rx="85" ry="55" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <ellipse cx="200" cy="240" rx="60" ry="30" fill="url(#furLight)" opacity="0.7"/>

        <!-- Head -->
        <circle cx="200" cy="175" r="62" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <ellipse cx="200" cy="160" rx="42" ry="22" fill="url(#furLight)" opacity="0.7"/>

        <!-- Ears -->
        <path class="ear-l" d="M 155 130 Q 135 100 145 85 Q 165 95 175 140 Z"
              fill="#8b4513" stroke="#5a2d0a" stroke-width="2"/>
        <path class="ear-r" d="M 245 130 Q 265 100 255 85 Q 235 95 225 140 Z"
              fill="#8b4513" stroke="#5a2d0a" stroke-width="2"/>

        <!-- Snout -->
        <ellipse cx="200" cy="205" rx="30" ry="22" fill="url(#furLight)" stroke="#6b3410" stroke-width="2"/>

        <!-- Nose -->
        <ellipse cx="200" cy="193" rx="9" ry="7" fill="#1a0d05"/>
        <ellipse cx="197" cy="191" rx="3" ry="2" fill="#fff" opacity="0.6"/>

        <!-- Mouth -->
        <path d="M 200 200 Q 200 215 185 215" stroke="#1a0d05" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 200 200 Q 200 215 215 215" stroke="#1a0d05" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Tongue -->
        <ellipse class="tongue" cx="200" cy="222" rx="8" ry="10" fill="#ff6b9d"/>
        <line x1="200" y1="218" x2="200" y2="230" stroke="#d94478" stroke-width="1"/>

        <!-- Eyes -->
        <g class="eye">
          <circle cx="175" cy="165" r="10" fill="url(#eye)" filter="url(#glow)"/>
          <circle cx="172" cy="162" r="3" fill="#fff"/>
        </g>
        <g class="eye">
          <circle cx="225" cy="165" r="10" fill="url(#eye)" filter="url(#glow)"/>
          <circle cx="222" cy="162" r="3" fill="#fff"/>
        </g>

        <!-- Front legs -->
        <rect x="175" y="285" width="16" height="40" rx="8" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <rect x="209" y="285" width="16" height="40" rx="8" fill="url(#fur)" stroke="#6b3410" stroke-width="2"/>
        <ellipse cx="183" cy="325" rx="12" ry="6" fill="#3d1f0a"/>
        <ellipse cx="217" cy="325" rx="12" ry="6" fill="#3d1f0a"/>

        <!-- Cheek blush -->
        <circle cx="160" cy="190" r="7" fill="#ff6b9d" opacity="0.4"/>
        <circle cx="240" cy="190" r="7" fill="#ff6b9d" opacity="0.4"/>

        <!-- Collar -->
        <path d="M 150 235 Q 200 250 250 235 L 248 245 Q 200 260 152 245 Z"
              fill="#e91e63" stroke="#9c1144" stroke-width="1.5"/>
        <circle cx="200" cy="252" r="6" fill="gold" stroke="#b8860b" stroke-width="1.5"/>
        <text x="200" y="256" text-anchor="middle" font-size="7" fill="#6b4700" font-weight="bold">&#9733;</text>
      </g>

      <!-- Sparkles -->
      <g fill="#fff9c4" filter="url(#glow)">
        <path class="sparkle" style="animation-delay:0s"    d="M 80 100 l 3 -10 l 3 10 l 10 3 l -10 3 l -3 10 l -3 -10 l -10 -3 z"/>
        <path class="sparkle" style="animation-delay:0.7s"  d="M 340 90  l 2 -7 l 2 7 l 7 2 l -7 2 l -2 7 l -2 -7 l -7 -2 z"/>
        <path class="sparkle" style="animation-delay:1.3s"  d="M 60 300  l 2 -7 l 2 7 l 7 2 l -7 2 l -2 7 l -2 -7 l -7 -2 z"/>
        <path class="sparkle" style="animation-delay:0.4s"  d="M 350 280 l 3 -10 l 3 10 l 10 3 l -10 3 l -3 10 l -3 -10 l -10 -3 z"/>
      </g>
    </svg>
  </div>

  <script>
    // Scatter twinkling stars
    const body = document.body;
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.width = s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (Math.random() * 3 + 2) + 's';
      body.appendChild(s);
    }
  </script>
</body>
</html>
